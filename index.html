<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/Logo.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- Primary Meta Tags -->
		<title>AICOYO — The Conversation Infrastructure</title>
		<meta name="title" content="AICOYO — The Conversation Infrastructure" />
		<meta
			name="description"
			content="Design, deploy, and monitor AI voice agents that sound like your best team member. Enterprise telephony, RAG, and live tooling — every conversation on-brand, compliant, and outcome-driven."
		/>
		<meta
			name="keywords"
			content="AI call agent, voice AI, customer support automation, conversational AI, contact center AI, intelligent voice assistant, business automation, AICOYO"
		/>

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://aicoflow.com/" />
		<meta
			property="og:title"
			content="AICOYO — The Conversation Infrastructure"
		/>
		<meta
			property="og:description"
			content="Design, deploy, and monitor AI voice agents. Enterprise telephony, RAG, and live tooling — every conversation on-brand and outcome-driven."
		/>
		<meta property="og:image" content="/og-image.png" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://aicoflow.com/" />
		<meta
			property="twitter:title"
			content="AICOYO — The Conversation Infrastructure"
		/>
		<meta
			property="twitter:description"
			content="Design, deploy, and monitor AI voice agents. Enterprise telephony, RAG, and live tooling — every conversation on-brand and outcome-driven."
		/>
		<meta property="twitter:image" content="/og-image.png" />

		<!-- DNS Prefetch & Preconnect for faster third-party connections -->
		<link rel="dns-prefetch" href="https://fonts.googleapis.com" />
		<link rel="dns-prefetch" href="https://fonts.gstatic.com" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<!-- Preload critical assets for faster FCP/LCP -->
		<link rel="modulepreload" href="/src/main.ts" />

		<!-- Critical CSS inline to eliminate render-blocking -->
		<style>
			/* Critical above-the-fold styles - inlined for instant render */
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				margin: 0;
				font-family:
					'Sora', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
				line-height: 1.6;
				background-color: #0B1226;
				color: #F1F5F9;
				overflow-x: hidden;
			}

			#app {
				min-height: 100vh;
				opacity: 0;
				animation: fadeIn 0.3s ease-out forwards;
			}

			@keyframes fadeIn {
				to {
					opacity: 1;
				}
			}

			/* Prevent layout shift with loading placeholder */
			.hero {
				min-height: 100vh;
				display: flex;
				align-items: center;
				padding-top: 80px;
			}

			/* Loading skeleton to prevent CLS */
			.nav-skeleton {
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				height: 72px;
				background: rgba(11, 18, 38, 0.24);
				backdrop-filter: blur(16px);
				z-index: 1000;
			}

			/* Hide until JS loads */
			.no-js-hide {
				visibility: hidden;
			}
		</style>

		<!-- Detect JS availability -->
		<script>
			document.documentElement.classList.add("js-enabled");
		</script>

		<!-- Non-blocking async script loading -->
		<script>
			// Defer non-critical scripts
			window.addEventListener("load", function () {
				// Load fonts after page load
				if ("fonts" in document) {
					requestIdleCallback(function () {
						var link = document.createElement("link");
						link.rel = "stylesheet";
						link.href =
							"https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap";
						document.head.appendChild(link);
					});
				}
			});
		</script>
	</head>
	<body>
		<!-- Navigation skeleton for instant feedback -->
		<div class="nav-skeleton"></div>

		<div id="app"></div>

		<!-- Defer main script slightly to prioritize critical rendering -->
		<script type="module">
			// Load main app after a brief delay to let browser breathe
			requestAnimationFrame(() => {
				requestAnimationFrame(() => {
					import("/src/main.ts");
				});
			});
		</script>
	</body>
</html>
